<div *ngIf="task" class="container mt-4">
  <div class="card shadow-lg border-0 rounded-4 p-4">

    <h3 class="mb-4 text-center fw-bold text-primary"> Edit Task</h3>

    
    <div class="mb-3">
      <label class="form-label fw-semibold">Title</label>
      <input [(ngModel)]="task.title" 
             class="form-control" 
             placeholder="Enter task title">
    </div>

   
    <div class="mb-3">
      <label class="form-label fw-semibold">Description</label>
      <textarea [(ngModel)]="task.description" 
                class="form-control" 
                rows="3"
                placeholder="Enter task description"></textarea>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label fw-semibold">Due Date</label>
        <input type="date" 
               [(ngModel)]="task.dueDate" 
               class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label fw-semibold">Status</label>
        <select [(ngModel)]="task.status" class="form-select">
          <option>Pending</option>
          <option>In Progress</option>
          <option>Completed</option>
        </select>
      </div>
    </div>

    
    <div class="mb-4">
      <label class="form-label fw-semibold">Priority</label>
      <select [(ngModel)]="task.priority" class="form-select">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>
    </div>

   
    <div class="d-grid">
      <button (click)="updateTask()" 
              class="btn btn-warning btn-lg fw-bold">
        Save Changes
      </button>
    </div>

  </div>
</div>
