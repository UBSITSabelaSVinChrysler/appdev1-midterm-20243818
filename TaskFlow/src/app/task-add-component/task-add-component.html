<div class="card shadow p-4">
    <h4 class="mb-3">Add New Task</h4>
  <input [(ngModel)]="task.title" placeholder="Title" class="form-control mb-2">
  <input [(ngModel)]="task.description" placeholder="Description" class="form-control mb-2">
  
    <!-- STATUS -->
    <div class="mb-3">
      <label class="form-label fw-bold">Task Status</label>
      <select [(ngModel)]="task.status" class="form-select">
        <option value="" disabled selected>Select status</option>
        <option value="Pending"> Pending</option>
        <option value="In Progress"> In Progress</option>
        <option value="Completed"> Completed</option>
      </select>
    </div>
  
    <!-- PRIORITY -->
    <div class="mb-3">
      <label class="form-label fw-bold">Priority Level</label>
      <select [(ngModel)]="task.priority" class="form-select">
        <option value="" disabled selected>Select priority</option>
        <option value="Low"> Low</option>
        <option value="Medium"> Medium</option>
        <option value="High"> High</option>
      </select>
    </div>
  
    <!-- BUTTON -->
    <div class="d-flex justify-content-end">
      <button (click)="addTask()" class="btn btn-success px-4">
         Add Task
      </button>
    </div>
  </div>
